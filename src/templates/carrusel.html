<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libros | Galería Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-dark: #0a0a0a;
            --accent-cyan: #00f2ff;
            --accent-gold: #c5a059;
            --library-brown: #2c1810;
            --text-light: #e2d1c3;
        }

        body {
            font-family: 'Georgia', serif;
            /* Degradado oscuro similar al de la imagen de referencia */
            background: radial-gradient(circle at top, #1a2a2d 0%, #050505 100%);
            color: var(--text-light);
            margin: 0;
            min-height: 100vh;
        }

        /* Navbar estilizado */
        nav {
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 252, 247, 0.1);
            text-align: center;
        }
        nav a {
            color: var(--accent-gold);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
        }

        .header-section {
            text-align: center;
            margin: 50px 0;
        }

        .header-section h2 {
            font-size: 3rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: white;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

      
        .carousel-container-custom {
            position: relative;
            padding: 40px;
           
            border-top: 2px solid var(--accent-cyan);
            box-shadow: 0 -15px 30px -10px rgba(0, 242, 255, 0.3);
        }

        .carousel-item {
            text-align: center;
        }

        .book-frame {
            display: inline-block;
            position: relative;
            padding: 10px;
            background: linear-gradient(145deg, #1a1a1a, #000);
            border-radius: 15px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            transition: all 0.4s ease;
        }

        .carousel-item img {
            height: 450px;
            width: 300px;
            object-fit: cover;
            border-radius: 10px;
            transition: transform 0.5s;
        }

        /* Efecto de resplandor */
        .carousel-item.active .book-frame {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.4);
        }

        /* Botón Flotante Estilo Pluma */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px;
            height: 65px;
            background: black;
            color: var(--accent-cyan);
            border: 2px solid var(--accent-cyan);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
            cursor: pointer;
            transition: 0.3s;
            z-index: 1000;
        }
        .fab:hover {
            background: var(--accent-cyan);
            color: black;
            transform: scale(1.1);
        }

        
        .custom-modal {
            background: #0a0a0a;
            color: white;
            border: 1px solid var(--accent-cyan);
            border-radius: 0;
        }

        .upload-area {
            border: 2px dashed rgba(0, 242, 255, 0.3);
            background: rgba(0, 242, 255, 0.05);
            padding: 50px;
            border-radius: 10px;
        }

        .btn-save {
            background: var(--accent-cyan);
            color: black;
            font-weight: bold;
            border: none;
            padding: 10px 30px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <nav>
        <a href="/p1">Inicio</a> &nbsp; | &nbsp; 
        <a href="/pantalla2">Catálogo</a> &nbsp; | &nbsp; 
        <span style="color: white">Nuevas Adquisiciones</span>
    </nav>

    <div class="header-section">
        <small style="color: var(--accent-cyan); letter-spacing: 3px;">DISPONIBLE AHORA</small>
        <h2>Selecciona tu Obra</h2>
        <p style="opacity: 0.7;">Explora las joyas literarias ocultas en nuestra bóveda</p>
    </div>

    <div class="container-fluid carousel-container-custom">
        <div id="mainCarousel" class="carousel slide carousel-fade" data-bs-ride="carousel">
            <div class="carousel-inner" id="carouselContainer">
                
                <div class="carousel-item active">
                    <div class="book-frame">
                        <img src="https://images.unsplash.com/photo-1543004629-141a44568e8e?auto=format&fit=crop&q=80&w=300&h=450" alt="Libro 1">
                    </div>
                    <div class="mt-4">
                        <h3 class="text-white">El Misterio de Ateneo</h3>
                        <span class="badge bg-info text-dark">MISTERIO</span>
                    </div>
                </div>

                <div class="carousel-item">
                    <div class="book-frame">
                        <img src="https://images.unsplash.com/photo-1512820790803-83ca734da794?auto=format&fit=crop&q=80&w=300&h=450" alt="Libro 2">
                    </div>
                    <div class="mt-4">
                        <h3 class="text-white">Crónicas de Papel</h3>
                        <span class="badge bg-warning text-dark">HISTÓRICO</span>
                    </div>
                </div>

            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#mainCarousel" data-bs-slide="prev">
                <i class="fas fa-chevron-left fa-2xl" style="color: var(--accent-cyan)"></i>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#mainCarousel" data-bs-slide="next">
                <i class="fas fa-chevron-right fa-2xl" style="color: var(--accent-cyan)"></i>
            </button>
        </div>
    </div>

    <button class="fab" data-bs-toggle="modal" data-bs-target="#uploadModal">
        <i class="fas fa-plus"></i>
    </button>

    <div class="modal fade" id="uploadModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <form method="POST" action="/carrusel" enctype="multipart/form-data" class="modal-content custom-modal">
                <div class="modal-body text-center p-5">
                    <div class="upload-area" id="dropZone" onclick="document.getElementById('imagenInput').click();">
                        <input type="file" name="imagen" id="imagenInput" accept="image/*" required hidden onchange="previewImage(event)">
                        <i class="fas fa-cloud-upload-alt mb-3" style="font-size: 3rem; color: var(--accent-cyan);"></i>
                        <h5 class="text-white">REGISTRAR NUEVA OBRA</h5>
                        <p class="small opacity-50">Sube la portada del libro para añadirla a la bóveda</p>
                    </div>
                    <div class="mt-4">
                        <button type="submit" id="submitBtn" class="btn btn-save" disabled>Confirmar Adquisición</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function previewImage(event) {
            const submitBtn = document.getElementById('submitBtn');
            if (event.target.files.length > 0) {
                submitBtn.disabled = false;
                submitBtn.style.boxShadow = "0 0 20px #00f2ff";
            }
        }
    </script>
</body>
</html>
